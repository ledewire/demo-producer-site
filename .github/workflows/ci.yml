name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  ci:
    name: Typecheck, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
        env:
          # Dummy secret satisfying the ≥32-char requirement.
          # Tests mock the session & SDK; this value is never used at runtime.
          SESSION_SECRET: "ci-testing-secret-for-github-actions-only-32chars"
          LEDEWIRE_BASE_URL: "https://api.ledewire.com"
